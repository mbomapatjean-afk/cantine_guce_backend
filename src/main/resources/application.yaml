spring:
  application:
    name: cantine

  datasource:
    url: jdbc:mysql://localhost:3307/cantine_db?autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name : com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        connection:
          characterEncoding : utf8mb4

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

server:
  port: 8981


